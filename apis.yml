aid: oauth
name: OAuth
description: >-
  OAuth is an open authorization framework that enables third-party applications
  to access user resources without exposing credentials. It provides a secure,
  token-based delegation mechanism widely used across the web for granting
  limited access to APIs and services on behalf of users.
